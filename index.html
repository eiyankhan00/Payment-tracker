<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Payment Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- html2canvas and jsPDF for Exporting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Hind Siliguri', sans-serif;
            background-color: #f1f5f9;
            background-image: radial-gradient(circle at top right, #e0e7ff, transparent 40%),
                              radial-gradient(circle at bottom left, #e0e7ff, transparent 40%);
            background-attachment: fixed;
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* Loader Animation */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(79, 70, 229, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(79, 70, 229, 0); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s infinite;
        }

        /* Printable Area - Hidden from UI */
        #printArea {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 800px;
            background: white;
            padding: 40px;
            color: black;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col items-center py-4 md:py-6 px-3 sm:px-4">

    <!-- Language Switcher -->
    <div class="max-w-6xl w-full flex justify-end mb-3 px-1 relative z-20">
        <button onclick="toggleLanguage()" id="langToggleBtn" class="bg-white/60 hover:bg-white backdrop-blur-md border border-indigo-200 text-indigo-700 font-bold py-1.5 px-4 rounded-full shadow-sm text-xs sm:text-sm transition-all flex items-center gap-2">
            <i class="fas fa-language text-lg"></i> <span id="langToggleText">English</span>
        </button>
    </div>

    <!-- Custom Modal for Alerts -->
    <div id="messageModal" class="fixed inset-0 bg-gray-900/60 hidden items-center justify-center z-50 backdrop-blur-sm transition-opacity">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl transform transition-all scale-100 mx-4 border border-gray-100">
            <h3 id="modalTitle" class="text-xl font-bold mb-2 text-gray-800"></h3>
            <p id="modalMessage" class="text-gray-600 mb-6 font-medium leading-relaxed"></p>
            <div class="flex justify-end gap-3" id="modalButtons">
                <button onclick="closeModal()" id="modalOkBtn" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl hover:bg-indigo-700 transition font-semibold shadow-md w-full sm:w-auto">ঠিক আছে</button>
            </div>
        </div>
    </div>

    <!-- Main Layout Wrapper -->
    <div class="max-w-6xl w-full flex flex-col gap-5 lg:grid lg:grid-cols-12 lg:gap-6 pb-10 lg:pb-0">
        
        <!-- LEFT COLUMN (Form & Summary) -->
        <div class="lg:col-span-4 flex flex-col gap-5">
            
            <!-- App Header -->
            <div class="glass-panel p-6 rounded-3xl text-center relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-r from-indigo-500/10 to-purple-500/10 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                <div class="w-16 h-16 bg-gradient-to-tr from-indigo-600 to-purple-600 text-white rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 shadow-lg shadow-indigo-200 transform group-hover:rotate-6 transition-transform duration-300">
                    <i class="fas fa-wallet"></i>
                </div>
                <h1 id="appTitle" class="text-2xl sm:text-3xl font-extrabold text-gray-800 tracking-tight">পেমেন্ট <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">ট্র্যাকার</span></h1>
                <p id="appSubtitle" class="text-xs sm:text-sm text-gray-500 mt-1.5 font-semibold">আপনার আয়ের আধুনিক হিসাব</p>
                
                <div id="statusBadge" class="mt-4 inline-flex items-center justify-center gap-1.5 text-[10px] sm:text-xs font-bold text-emerald-800 bg-emerald-100 py-1.5 px-4 rounded-full border border-emerald-200 transition-colors duration-300 shadow-sm">
                    <i class="fas fa-sync fa-spin text-[10px]" id="statusIcon"></i> <span id="statusText">কানেক্ট হচ্ছে...</span>
                </div>
            </div>

            <!-- Summary Card -->
            <div class="bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 rounded-3xl p-6 sm:p-8 text-white shadow-xl shadow-indigo-200 flex items-center justify-between relative overflow-hidden border border-indigo-400/30 transform transition-transform hover:-translate-y-1 duration-300">
                <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-10 rounded-full blur-2xl"></div>
                <div class="absolute bottom-0 left-0 -mb-10 -ml-10 w-32 h-32 bg-white opacity-10 rounded-full blur-xl"></div>
                
                <div class="relative z-10">
                    <h2 id="totalPaymentLabel" class="text-indigo-100 text-xs sm:text-sm font-bold mb-1 opacity-95 tracking-wider uppercase">সর্বমোট পেমেন্ট</h2>
                    <div class="text-4xl sm:text-5xl font-extrabold font-mono tracking-tight mt-1 text-white drop-shadow-md"><span class="currency-symbol">৳</span> <span id="totalAmount">০</span></div>
                </div>
                <div class="w-14 h-14 sm:w-16 sm:h-16 bg-white/20 rounded-2xl flex items-center justify-center backdrop-blur-md relative z-10 border border-white/30 rotate-3 shadow-inner">
                    <i class="fas fa-coins text-2xl sm:text-3xl text-yellow-300 drop-shadow-lg"></i>
                </div>
            </div>

            <!-- Input Form -->
            <div class="glass-panel p-5 sm:p-6 rounded-3xl border-t-4 border-indigo-500">
                <h2 id="formTitle" class="text-lg sm:text-xl font-extrabold mb-5 flex items-center text-gray-800">
                    <i class="fas fa-plus-circle text-indigo-600 mr-2.5 text-xl form-title-icon"></i><span id="formTitleText">নতুন পেমেন্ট যোগ</span>
                </h2>
                <form id="paymentForm" class="space-y-4">
                    <div>
                        <label id="sourceLabel" class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">উৎস / নাম <span class="text-red-500">*</span></label>
                        <input type="text" id="source" required class="w-full px-4 py-3 text-sm rounded-xl border-2 border-gray-200 bg-gray-50 focus:bg-white focus:ring-0 focus:border-indigo-500 outline-none transition-all font-semibold text-gray-800 shadow-sm" placeholder="যেমন: রহিম, প্রজেক্ট">
                    </div>
                    <div>
                        <label id="amountLabel" class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">টাকার পরিমাণ (৳) <span class="text-red-500">*</span></label>
                        <input type="number" id="amount" required min="1" class="w-full px-4 py-3 text-sm rounded-xl border-2 border-gray-200 bg-gray-50 focus:bg-white focus:ring-0 focus:border-indigo-500 outline-none transition-all font-bold text-indigo-700 shadow-sm text-lg" placeholder="0.00">
                    </div>
                    <div>
                        <label id="dateLabel" class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">তারিখ <span class="text-red-500">*</span></label>
                        <input type="date" id="date" required class="w-full px-4 py-3 text-sm rounded-xl border-2 border-gray-200 bg-gray-50 focus:bg-white focus:ring-0 focus:border-indigo-500 outline-none transition-all font-semibold text-gray-800 shadow-sm">
                    </div>
                    <div>
                        <label id="notesLabel" class="block text-xs font-bold text-gray-700 mb-1.5 uppercase tracking-wide">বিবরণ (ঐচ্ছিক)</label>
                        <input type="text" id="notes" class="w-full px-4 py-3 text-sm rounded-xl border-2 border-gray-200 bg-gray-50 focus:bg-white focus:ring-0 focus:border-indigo-500 outline-none transition-all font-medium text-gray-700 shadow-sm" placeholder="কীসের টাকা...">
                    </div>
                    
                    <div class="pt-2 flex gap-2">
                        <button type="button" id="cancelEditBtn" onclick="cancelEdit()" class="hidden w-1/3 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl transition-all items-center justify-center gap-2 text-sm">
                            বাতিল
                        </button>
                        <button type="submit" id="submitBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-200/50 hover:shadow-indigo-400/50 transition-all flex items-center justify-center gap-2 transform active:scale-[0.98] text-sm sm:text-base">
                            <i class="fas fa-save"></i> <span id="submitBtnText">সেভ করুন</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- RIGHT COLUMN (List & Tools) -->
        <div class="lg:col-span-8 flex flex-col gap-5 h-[600px] lg:h-auto min-h-[500px]">
            
            <!-- Toolbar (Search & Export) -->
            <div class="glass-panel rounded-3xl p-4 sm:p-5 flex flex-col sm:flex-row gap-4 justify-between items-center z-20 shadow-sm">
                <!-- Search -->
                <div class="w-full sm:w-1/2 relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-search text-gray-400"></i>
                    </div>
                    <input type="date" id="searchDate" onchange="applySearch()" class="w-full pl-10 pr-10 py-2.5 text-sm rounded-xl border-2 border-gray-200 bg-white focus:border-indigo-500 outline-none transition-all font-semibold text-gray-700" title="Search by date">
                    <button id="clearSearchBtn" onclick="clearSearch()" class="hidden absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-red-500 transition-colors">
                        <i class="fas fa-times-circle text-lg"></i>
                    </button>
                </div>
                
                <!-- Export Buttons -->
                <div class="w-full sm:w-auto flex gap-2 justify-end">
                    <button onclick="exportData('pdf')" class="flex-1 sm:flex-none bg-red-50 text-red-600 hover:bg-red-600 hover:text-white border border-red-200 hover:border-red-600 px-4 py-2.5 rounded-xl transition-all font-bold text-sm flex items-center justify-center gap-2 group shadow-sm">
                        <i class="fas fa-file-pdf group-hover:animate-bounce"></i> PDF
                    </button>
                    <button onclick="exportData('png')" class="flex-1 sm:flex-none bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white border border-blue-200 hover:border-blue-600 px-4 py-2.5 rounded-xl transition-all font-bold text-sm flex items-center justify-center gap-2 group shadow-sm">
                        <i class="fas fa-image group-hover:animate-bounce"></i> PNG
                    </button>
                </div>
            </div>

            <!-- List Card -->
            <div class="glass-panel rounded-3xl flex flex-col flex-1 overflow-hidden shadow-sm border border-gray-200 relative">
                <div class="p-4 sm:p-5 border-b border-gray-200 bg-white/90 flex justify-between items-center backdrop-blur-md z-10 shadow-sm">
                    <h2 id="listTitle" class="text-lg sm:text-xl font-extrabold text-gray-800 flex items-center">
                        <i class="fas fa-list-ul text-indigo-600 mr-2.5"></i>পেমেন্টের তালিকা
                    </h2>
                    <span id="recordCount" class="bg-indigo-50 text-indigo-800 border border-indigo-200 text-[10px] sm:text-xs font-extrabold px-3 py-1.5 rounded-full shadow-inner">০ টি রেকর্ড</span>
                </div>
                
                <div class="p-3 sm:p-4 flex-1 overflow-y-auto bg-gray-50/50 relative scroll-smooth" id="paymentsList">
                    
                    <div id="loadingState" class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm z-10 text-gray-600">
                        <div class="animate-pulse-ring rounded-full mb-2">
                            <i class="fas fa-wallet text-4xl sm:text-5xl text-indigo-600 drop-shadow-sm p-4"></i>
                        </div>
                        <p id="loadingMsg" class="font-bold text-sm sm:text-base text-indigo-600 animate-pulse mt-2">ডেটা লোড হচ্ছে...</p>
                    </div>

                    <div id="emptyState" class="hidden absolute inset-0 flex flex-col items-center justify-center text-gray-400 p-6 sm:p-8 text-center">
                        <div class="w-20 h-20 sm:w-24 sm:h-24 bg-white rounded-full flex items-center justify-center mb-4 sm:mb-5 shadow-md border border-gray-100 transform transition-transform hover:scale-110 duration-300">
                            <i class="fas fa-box-open text-4xl sm:text-5xl text-gray-300"></i>
                        </div>
                        <p id="emptyStateMsg" class="text-lg sm:text-xl font-extrabold text-gray-600 mb-1">কোনো পেমেন্ট নেই</p>
                        <p id="emptyStateSubMsg" class="text-sm font-medium text-gray-500 mt-2">নতুন পেমেন্ট যোগ করতে ফর্মটি পূরণ করুন।</p>
                    </div>

                    <ul id="listContainer" class="space-y-3 hidden pb-4">
                        <!-- Items will be injected here via JavaScript -->
                    </ul>
                </div>
            </div>

        </div>
    </div>

    <!-- Hidden Printable Area for Exporting -->
    <div id="printArea"></div>
